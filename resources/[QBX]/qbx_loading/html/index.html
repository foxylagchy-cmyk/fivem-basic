<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTA CERIA - Loading Screen</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <audio id="audio" loop></audio>

    <!-- Interactive Background Slideshow -->
    <div class="bg-slideshow" id="bg-slideshow">
        <div class="bg-image active" style="background-image: url('assets/images/1.png')"></div>
        <div class="bg-image" style="background-image: url('assets/images/2.png')"></div>
        <div class="bg-image" style="background-image: url('assets/images/3.png')"></div>
        <div class="bg-image" style="background-image: url('assets/images/4.png')"></div>
    </div>

    <!-- Overlays -->
    <div class="background">
        <div class="gradient-overlay"></div>
        <div class="overlay-pattern"></div>
        <div id="particles-container"></div>
    </div>

    <div class="content-wrapper">
        <div class="header">
            <div class="server-logo">
                <img src="assets/images/logo.png" alt="Kota Ceria Logo" class="logo-image">
                <div class="logo-text">
                    <h1>KOTA CERIA</h1>
                    <p>ROLEPLAY SERVER</p>
                </div>
            </div>
            
            <div class="top-controls">
                <button class="glass-btn interactive-btn" id="btn-keybinds">
                    <i class="fas fa-keyboard"></i>
                    <span>Kontrol</span>
                </button>
                <div class="audio-toggle interactive-btn" id="btn-audio">
                    <i class="fas fa-volume-up" id="audio-icon"></i>
                    <span>Musik (Spasi)</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <!-- Left Info Card -->
            <div class="info-section">
                <div class="info-card" id="dynamic-card">
                    <div class="icon-wrapper">
                        <i class="fas fa-star" id="card-icon"></i>
                    </div>
                    <h3 id="card-title">Selamat Datang di Kota Ceria!</h3>
                    <p id="card-desc">Gunakan akal sehat saat ber-Roleplay. Dilarang keras melakukan hal-hal yang melanggar aturan kota.</p>
                </div>
            </div>

            <!-- Slideshow Controls -->
            <div class="slider-controls">
                <button class="nav-btn" id="prev-slide"><i class="fas fa-chevron-left"></i></button>
                <div class="slide-indicators" id="slide-indicators">
                    <span class="dot active" data-index="0"></span>
                    <span class="dot" data-index="1"></span>
                    <span class="dot" data-index="2"></span>
                    <span class="dot" data-index="3"></span>
                </div>
                <button class="nav-btn" id="next-slide"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="footer">
            <div class="loading-stats">
                <div class="status-text" id="status-text">Memuat Aset...</div>
                <div class="percentage" id="percentage">0%</div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-glow"></div>
                </div>
            </div>
            <div class="tips-carousel" id="tips-carousel">
                <p>Tip: Gunakan /report jika menemukan pelanggaran di dalam kota.</p>
            </div>
        </div>
    </div>

    <!-- Modal Keybinds -->
    <div class="modal-overlay" id="modal-keybinds">
        <div class="modal-content glass-panel">
            <button class="close-btn" id="close-modal"><i class="fas fa-times"></i></button>
            <div class="modal-header">
                <i class="fas fa-gamepad"></i>
                <h2>Tombol Interaksi</h2>
            </div>
            <div class="keybinds-grid" id="keybinds-container">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
