<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kota Ceria Loading</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background"></div>
    
    <div class="overlay">
        <div class="content-container">
            <h1 class="server-title">KOTA CERIA</h1>
            <h2 class="server-subtitle">ROLEPLAY INDONESIA</h2>
            
            <div class="glass-panel">
                <div class="loading-status" id="status-text">Menyiapkan aset dunia...</div>
                
                <div class="progress-container">
                    <div class="progress-bar" id="progress-fill"></div>
                </div>
            </div>
            
            <div class="tips-container">
                <p id="tip-text">Gunakan /help di dalam kota jika kamu kebingungan.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
