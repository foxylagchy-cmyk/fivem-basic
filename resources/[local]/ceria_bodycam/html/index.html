<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceria Bodycam</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="notification-container"></div>
    
    <div id="bodycam-container" style="display: none;">
        <div class="bodycam-inner">
            <div class="logo-section">
                <!-- Custom Shield Vector Icon -->
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 11C13.6569 11 15 9.65685 15 8C15 6.34315 13.6569 5 12 5C10.3431 5 9 6.34315 9 8C9 9.65685 10.3431 11 12 11Z" fill="rgba(255,255,255,0.9)"/>
                    <path d="M16.9961 17C15.8021 14.6202 14.0301 14 11.9961 14C9.96207 14 8.19007 14.6202 6.99609 17" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="info-section">
                <div class="cam-header">
                    <div class="rec-indicator"></div>
                    <span class="cam-title">CERIA_CAM // REC</span>
                </div>
                <div class="line" id="player-name">Player Name</div>
                <div class="line" id="department-name">DEPARTMENT</div>
                <div class="line" id="current-time">Time</div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
