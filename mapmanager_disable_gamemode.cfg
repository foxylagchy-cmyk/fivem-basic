# Mapmanager Configuration - Disable Default Gamemode
# This prevents mapmanager from auto-loading basic-gamemode and spawnmanager
# Which conflict with QBX Framework (qbx_spawn)

# Disable gamemode loading
set mapmanager_gamemode ""
set mapmanager_enableBuild false

# Note: This config is executed from server.cfg
# Created: 2026-06-22
# Reason: Prevent basic-gamemode/spawnmanager auto-load
